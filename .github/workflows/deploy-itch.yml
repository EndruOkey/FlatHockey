name: Deploy to itch.io (branch channels)
run-name: itch deploy (${{ github.ref_name }} @ ${{ github.sha }})

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  deploy_itch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Inject build version
        run: |
          echo "VITE_BUILD_VERSION=${GITHUB_SHA}" >> $GITHUB_ENV
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "VITE_DEV_BUILD=true" >> $GITHUB_ENV
          else
            echo "VITE_DEV_BUILD=false" >> $GITHUB_ENV
          fi

      - name: Build workspace
        run: pnpm -r build

      - name: Install Butler
        run: |
          curl -L https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default -o butler.zip
          unzip butler.zip
          chmod +x butler
          sudo mv butler /usr/local/bin/

      - name: Decide itch target
        id: target
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "target=endruokey/flathockey:web" >> $GITHUB_OUTPUT
          elif [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "target=endruokey/flathockey-dev:web" >> $GITHUB_OUTPUT
          else
            echo "Unsupported branch: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Upload build to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          butler push ./client/dist ${{ steps.target.outputs.target }} --userversion "${GITHUB_REF_NAME}-${GITHUB_SHA}"

      - name: Backend health check
        if: github.ref_name == 'main'
        run: curl -f https://flathockey.fun/ws || true
