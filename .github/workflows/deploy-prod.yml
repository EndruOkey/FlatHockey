name: Deploy Prod

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROD_PORT: ${{ secrets.PROD_PORT }}
      PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
      PROD_SERVICE_NAME: ${{ secrets.PROD_SERVICE_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add Server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${PROD_PORT:-22}" "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deploy script
        run: |
          APP_DIR="${PROD_APP_DIR:-/opt/flathockey-prod}"
          ssh -p "${PROD_PORT:-22}" "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" "mkdir -p ${APP_DIR}/deploy"
          scp -P "${PROD_PORT:-22}" deploy/deploy.sh "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${APP_DIR}/deploy/deploy.sh"

      - name: Run deploy
        run: |
          APP_DIR="${PROD_APP_DIR:-/opt/flathockey-prod}"
          SERVICE_NAME="${PROD_SERVICE_NAME:-flathockey-ws2}"
          ssh -p "${PROD_PORT:-22}" "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
            "chmod +x ${APP_DIR}/deploy/deploy.sh && APP_DIR=${APP_DIR} SERVICE_NAME=${SERVICE_NAME} ${APP_DIR}/deploy/deploy.sh" \
            | tee deploy.log

      - name: Deployment Summary
        if: always()
        run: |
          APP_DIR="${PROD_APP_DIR:-/opt/flathockey-prod}"
          SERVICE_NAME="${PROD_SERVICE_NAME:-flathockey-ws2}"
          SYSTEMD_UNIT="$SERVICE_NAME"
          if [[ "$SYSTEMD_UNIT" != *.service ]]; then
            SYSTEMD_UNIT="${SYSTEMD_UNIT}.service"
          fi
          {
            echo "## PROD Deploy Summary"
            echo ""
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- APP_DIR: \`${APP_DIR}\`"
            echo "- Target: \`${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${APP_DIR}\`"
            echo "- Service: \`${SERVICE_NAME}\`"
            echo ""
            echo "### systemd status tail"
            echo '```'
            ssh -p "${PROD_PORT:-22}" "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
              "systemctl --no-pager --full status ${SYSTEMD_UNIT} | tail -n 30" || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
