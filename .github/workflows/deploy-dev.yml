name: Deploy Dev

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add Server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deploy script
        run: |
          scp -P "${DEPLOY_PORT:-22}" deploy/deploy.sh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/flathockey-prod/deploy.sh"

      - name: Run deploy
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "chmod +x /opt/flathockey-prod/deploy.sh && /opt/flathockey-prod/deploy.sh"
