name: Deploy DEV backend

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: deploy-dev-backend
  cancel-in-progress: true

jobs:
  deploy_backend:
    runs-on: ubuntu-latest
    env:
      DEV_HOST: ${{ vars.DEV_HOST }}
      DEV_USER: ${{ vars.DEV_USER || 'ubuntu' }}
      DEV_APP_DIR: ${{ vars.DEV_APP_DIR || '/opt/flathockey-dev' }}
      DEV_SERVICE_NAME: ${{ vars.DEV_SERVICE_NAME || 'flathockey-ws2' }}
      DEV_HEALTHCHECK_URL: ${{ vars.DEV_HEALTHCHECK_URL || 'https://flathockey.fun/dev/health' }}
      DEV_REPO_URL: git@github.com:${{ github.repository }}.git
    steps:
      - uses: actions/checkout@v4

      - name: Validate DEV deploy config
        run: |
          if [ -z "$DEV_HOST" ]; then
            echo "Missing repository variable DEV_HOST"
            exit 1
          fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEV_SSH_PRIVATE_KEY != '' && secrets.DEV_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEV_HOST" >> ~/.ssh/known_hosts

      - name: Bootstrap repo on DEV host
        run: |
          ssh "$DEV_USER@$DEV_HOST" "bash -lc '
            set -e
            if [ ! -d \"$DEV_APP_DIR/.git\" ]; then
              sudo mkdir -p \"$DEV_APP_DIR\"
              sudo chown \"$DEV_USER:$DEV_USER\" \"$DEV_APP_DIR\"
              if [ -z \"\$(ls -A \"$DEV_APP_DIR\")\" ]; then
                git clone \"$DEV_REPO_URL\" \"$DEV_APP_DIR\"
              fi
            fi
            cd \"$DEV_APP_DIR\"
            git fetch origin dev
            git checkout -B dev origin/dev
            if [ ! -f \"$DEV_APP_DIR/deploy/deploy.sh\" ]; then
              echo \"Missing $DEV_APP_DIR/deploy/deploy.sh\"
              exit 1
            fi
            chmod +x \"$DEV_APP_DIR/deploy/deploy.sh\"
          '"

      - name: Deploy backend to DEV
        run: |
          ssh "$DEV_USER@$DEV_HOST" "APP_DIR='$DEV_APP_DIR' BRANCH='dev' SERVICE_NAME='$DEV_SERVICE_NAME' bash '$DEV_APP_DIR/deploy/deploy.sh'"

      - name: External DEV health check
        run: curl -fsS "$DEV_HEALTHCHECK_URL"
