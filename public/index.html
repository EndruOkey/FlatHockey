<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hockey</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #07090f; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
    canvas { display: block; }

    #lobby {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(7,9,15,0.96);
      z-index: 10;
    }

    .box {
      text-align: center;
      padding: 44px 40px;
      border: 1px solid #222;
      border-radius: 14px;
      background: #0f1118;
      min-width: 320px;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, #3a9fff, #ff4455);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .sub { color: #555; margin-bottom: 34px; font-size: 0.82rem; letter-spacing: 0.05em; }

    input {
      width: 100%; padding: 13px 16px;
      background: #141720; border: 1px solid #2a2d3a; border-radius: 8px;
      color: #fff; font-size: 1.15rem; text-align: center;
      letter-spacing: 0.25em; text-transform: uppercase;
      margin-bottom: 10px; transition: border-color 0.15s;
    }
    input:focus { outline: none; border-color: #3a9fff; }
    input::placeholder { color: #333; letter-spacing: 0.1em; }

    button {
      width: 100%; padding: 13px;
      border: none; border-radius: 8px;
      color: #fff; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s;
      margin-bottom: 8px; letter-spacing: 0.05em;
    }
    button:hover:not(:disabled) { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: default; }

    #join-btn { background: linear-gradient(135deg, #2266cc, #1144aa); }
    #solo-btn  { background: #181c26; border: 1px solid #2a2d3a; }

    #status { color: #666; font-size: 0.82rem; min-height: 18px; margin-top: 10px; }

    #hint {
      position: fixed; bottom: 14px; left: 50%;
      transform: translateX(-50%);
      color: #333; font-size: 0.72rem;
      pointer-events: none; white-space: nowrap;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="lobby">
    <div class="box">
      <h1>HOCKEY</h1>
      <p class="sub">peer-to-peer · no lag · no server</p>

      <input id="room-input" type="text" placeholder="ROOM CODE" maxlength="8" autocomplete="off" spellcheck="false" />
      <button id="join-btn">JOIN / CREATE ROOM</button>
      <button id="solo-btn">SOLO MODE</button>

      <div id="status"></div>
    </div>
  </div>

  <div id="hint">WASD move &nbsp;·&nbsp; Mouse aim &nbsp;·&nbsp; LMB shoot (hold = charge) &nbsp;·&nbsp; RMB pass</div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
